<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Expense Tracker</h1>
        <p id="message-box" class="hidden"></p>
        <div id="input-container">
            <form id="expense-form">
                <div class="form-row">
                    <input type="text" name="expensename" required placeholder="Expense">
                    <input type="number" name="amount" step="any" required placeholder="Amount">
                </div>
                <div class="form-row">
                    <input type="date" name="date" required>
                    <button type="submit">Add Expense</button>
                </div>
            </form>
        </div>

        <div class="expense-container">
            <ul id="expense-list">
                <!-- expenses will be added through DOM -->
            </ul>
        </div>
        <div>
            <h3>Total: ₹<span id="amount-display"></span></h3>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
